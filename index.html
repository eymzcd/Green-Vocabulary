<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blending - Pixel Nature</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Pixel Fontu için Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik+Mono+One&display=swap');

        :root {
            --pixel-green: #4db33d;
            --dark-green: #1a3c15;
            --retro-red: #ff4b2b;
            --ui-bg: rgba(0, 0, 0, 0.75);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            background: #0d1a0a;
        }

        /* Arka Plan ve Retro Çizgi Efekti */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('gece.png') no-repeat center center fixed;
            background-size: cover; z-index: -1; transition: 1.2s ease-in-out;
        }

        body.day-mode .bg-container {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('gunduz.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* Pixel Tarzı Ekran Çizgileri */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; z-index: 1; pointer-events: none;
        }

        .pixel-card {
            background: var(--ui-bg);
            border: 4px solid var(--pixel-green);
            padding: 30px;
            border-radius: 4px; /* Keskin köşeler pixel havası verir */
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%; max-width: 600px;
            z-index: 10;
        }

        h1 {
            font-family: 'Rubik Mono One', sans-serif;
            font-size: 2.2rem;
            color: var(--pixel-green);
            margin: 0 0 15px 0;
            text-shadow: 4px 4px 0px #000;
        }

        .question-text {
            font-size: 1.4rem; font-weight: 900;
            margin-bottom: 20px; color: #fff;
            background: rgba(255,255,255,0.1); padding: 10px;
        }

        .letter-input {
            width: 42px; height: 52px;
            margin: 4px; font-size: 1.8rem;
            font-weight: 900; font-family: 'Press Start 2P', cursive; /* Harfler pixel */
            text-align: center; text-transform: uppercase;
            background: #222; border: 3px solid #555;
            color: #fff; outline: none; transition: 0.1s;
        }

        .letter-input:focus { border-color: var(--pixel-green); background: #333; }
        .letter-input.correct { border-color: #fff; background: var(--pixel-green); box-shadow: 0 0 15px var(--pixel-green); }
        .letter-input.error { border-color: var(--retro-red); background: #421; animation: shake 0.3s; }

        .pixel-btn {
            background: var(--pixel-green);
            border: none; border-bottom: 6px solid var(--dark-green);
            color: white; padding: 15px 25px; margin: 10px;
            font-weight: 900; font-size: 1rem; cursor: pointer;
            transition: 0.1s; text-transform: uppercase;
        }

        .pixel-btn:active { border-bottom: 2px solid var(--dark-green); transform: translateY(4px); }
        .pixel-btn:hover { background: #5ed14d; }

        .pass-btn { background: #777; border-bottom-color: #444; }
        .pass-btn:hover { background: var(--retro-red); }

        #energy-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 20px; background: #222; border: 3px solid #fff;
            display: none;
        }
        #energy-fill { height: 100%; background: var(--pixel-green); width: 0%; transition: 0.4s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="scanlines"></div>

    <div id="energy-bar"><div id="energy-fill"></div></div>

    <!-- Menü -->
    <div class="pixel-card" id="menu-screen">
        <h1>BLENDİNG</h1>
        <p style="font-weight: 800; color: #aaa; margin-bottom: 30px;">RETRO NATURE QUEST</p>
        <button class="pixel-btn" onclick="startGame('free')">BAŞLA</button>
        <button class="pixel-btn" onclick="startGame('timed')" style="background: #e67e22; border-bottom-color: #a35613;">SÜRELİ</button>
    </div>

    <!-- Oyun -->
    <div class="pixel-card" id="game-screen" style="display: none;">
        <div style="display: flex; justify-content: space-between; font-weight: 900; color: var(--pixel-green); margin-bottom: 10px;">
            <span id="stopwatch">00:00</span>
            <span id="q-counter">1/10</span>
        </div>
        <div class="question-text" id="current-q">---</div>
        <div id="letter-box"></div>
        <div id="hint-text" style="height: 25px; margin-top: 15px; font-weight: 900; color: #ffeb3b;"></div>
        <button class="pixel-btn pass-btn" onclick="pass()">CEVABI GÖR</button>
    </div>

    <!-- Final -->
    <div class="pixel-card" id="final-screen" style="display: none;">
        <h1>OYUN BİTTİ</h1>
        <p id="stats" style="font-size: 1.2rem; font-weight: 800;"></p>
        <button class="pixel-btn" onclick="location.reload()">TEKRAR</button>
    </div>

<script>
    const snd = {
        win: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
        err: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        pass: new Audio('https://assets.mixkit.co/active_storage/sfx/953/953-preview.mp3')
    };

    const words = [
        {q: "Bloom + Biology", a: "Bloomology"}, {q: "Sprout + Maintain", a: "Sproutain"}, {q: "Floral + Universe", a: "Floraverse"},
        {q: "Verdant + Nature", a: "Verdanture"}, {q: "Stem + Empathy", a: "Stempathy"}, {q: "Seed + Landscape", a: "Seedscape"},
        {q: "Branch + Chic", a: "Branchic"}, {q: "Moss + Osmosis", a: "Mossmosis"}, {q: "Twig + Digital", a: "Twigital"},
        {q: "Leaf + Purity", a: "Leafity"}, {q: "Vine + Innovate", a: "Vinevate"}, {q: "Fern + Finish", a: "Fernish"},
        {q: "Root + Utopia", a: "Rootopia"}, {q: "Bud + Flow", a: "Budflow"}, {q: "Bark + Architecture", a: "Barkitecture"},
        {q: "Petal + Logic", a: "Petalogic"}, {q: "Leaf + Evolution", a: "Leafolution"}, {q: "Forest + Static", a: "Forestatic"},
        {q: "Bloom + Mania", a: "Bloomania"}, {q: "Wild + Design", a: "Wildesign"}, {q: "Eco + System", a: "Ecosystem"},
        {q: "Garden + Energy", a: "Gardenergy"}, {q: "Green + Galaxy", a: "Greenglaxy"}, {q: "Earth + Rhythm", a: "Earththm"}
    ];

    let idx = 0, data = [], mode = 'free', timer, score = 0;

    function startGame(m) {
        mode = m;
        data = [...words].sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('energy-bar').style.display = 'block';
        document.body.classList.add('day-mode');
        
        let sec = 0;
        timer = setInterval(() => {
            sec++;
            let m = Math.floor(sec/60).toString().padStart(2,'0');
            let s = (sec%60).toString().padStart(2,'0');
            document.getElementById('stopwatch').textContent = `${m}:${s}`;
        }, 1000);
        
        load();
    }

    function load() {
        const cur = data[idx];
        document.getElementById('current-q').textContent = cur.q;
        document.getElementById('q-counter').textContent = `${idx + 1}/10`;
        document.getElementById('hint-text').textContent = '';
        
        const box = document.getElementById('letter-box');
        box.innerHTML = '';
        
        for(let i=0; i<cur.a.length; i++) {
            let inp = document.createElement('input');
            inp.className = 'letter-input';
            inp.maxLength = 1;
            inp.addEventListener('input', (e) => {
                if(e.target.value && box.children[i+1]) box.children[i+1].focus();
                check();
            });
            inp.addEventListener('keydown', (e) => {
                if(e.key === 'Backspace' && !e.target.value && box.children[i-1]) box.children[i-1].focus();
            });
            box.appendChild(inp);
        }
        box.children[0].focus();
    }

    function check() {
        const inps = document.querySelectorAll('.letter-input');
        let val = Array.from(inps).map(i => i.value).join('');
        let target = data[idx].a;

        if(val.length === target.length) {
            if(val.toLowerCase() === target.toLowerCase()) {
                snd.win.play();
                inps.forEach(i => i.className = 'letter-input correct');
                score++;
                document.getElementById('energy-fill').style.width = (score * 10) + '%';
                setTimeout(next, 600);
            } else {
                snd.err.play();
                inps.forEach(i => {
                    i.classList.add('error');
                    setTimeout(() => i.classList.remove('error'), 300);
                });
            }
        }
    }

    function pass() {
        snd.pass.play();
        document.getElementById('hint-text').textContent = "CEVAP: " + data[idx].a;
        const inps = document.querySelectorAll('.letter-input');
        inps.forEach((inp, i) => {
            inp.value = data[idx].a[i];
            inp.style.color = 'var(--retro-red)';
        });
        setTimeout(next, 1200);
    }

    function next() {
        idx++;
        if(idx < 10) load();
        else {
            clearInterval(timer);
            document.body.classList.remove('day-mode');
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('stats').innerHTML = `SÜRE: ${document.getElementById('stopwatch').textContent}<br>PUAN: ${score}/10`;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }
</script>
</body>
</html>

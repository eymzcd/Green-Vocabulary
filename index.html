<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blending Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Görseldeki sade ve şık fontlar */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Lora:wght@700&display=swap');

        :root {
            --bg-dark: #123524; /* Görseldeki o derin koyu yeşil */
            --text-light: #bde4ca; /* Soft yeşil metin rengi */
            --accent-yellow: #ffcc00; /* İlerleme noktasındaki sarı */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(189, 228, 202, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        .main-wrapper {
            width: 100%; max-width: 900px;
            text-align: center;
        }

        /* Üst Panel (Soru 1 / 10 ve Noktalar) */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px 30px;
            margin: 0 auto 10px auto;
            width: 80%;
            font-size: 14px; font-weight: 600;
        }

        .dots-group { display: flex; gap: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(189, 228, 202, 0.15); }
        .dot.active { background: var(--accent-yellow); box-shadow: 0 0 8px var(--accent-yellow); }

        .divider {
            width: 85%; height: 1px; background: var(--glass-border);
            margin: 20px auto 40px auto;
        }

        /* Kelime Kutuları */
        .category-tag {
            font-size: 13px; font-weight: 600; margin-bottom: 25px;
            opacity: 0.7; letter-spacing: 1px;
        }

        .word-container {
            display: flex; justify-content: center; align-items: center;
            gap: 25px; margin-bottom: 30px;
        }

        .word-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 50px;
            font-family: 'Lora', serif; /* Görseldeki serif font tarzı */
            font-size: 42px; font-weight: 700;
            letter-spacing: 2px;
        }

        .plus-sign { font-size: 30px; opacity: 0.5; }

        /* Cevap Kutucukları */
        .answer-group {
            display: flex; justify-content: center; gap: 12px; margin: 40px 0;
        }

        .letter-slot {
            width: 65px; height: 85px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            font-size: 32px; font-weight: 800;
            color: var(--text-light);
            text-align: center; text-transform: uppercase;
            outline: none; transition: 0.2s;
        }

        .letter-slot:focus {
            border-color: var(--accent-yellow);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        /* Kontrol Et Butonu */
        .check-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 16px 60px; border-radius: 50px;
            font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .check-btn:hover {
            background: rgba(189, 228, 202, 0.1);
            border-color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- Üst Bar -->
        <div class="top-bar">
            <span>SORU 1 / 10</span>
            <div class="dots-group" id="dots">
                <!-- JS ile dolacak -->
            </div>
            <span>🍃 Süresiz</span>
        </div>

        <div class="divider"></div>

        <!-- Soru Alanı -->
        <div id="game-content">
            <div class="category-tag" id="hint">GB BRITANYA & ÇIKIŞ</div>
            
            <div class="word-container">
                <div class="word-box" id="w1">BRITAIN</div>
                <div class="plus-sign">+</div>
                <div class="word-box" id="w2">EXIT</div>
            </div>

            <div class="plus-sign" style="margin-bottom: 20px;">=</div>

            <div class="answer-group" id="slots"></div>

            <button class="check-btn" onclick="checkAnswer()">KONTROL ET ✓</button>
        </div>
    </div>

<script>
    const levels = [
        {w1: "BRITAIN", w2: "EXIT", ans: "BREXIT", hint: "GB BRITANYA & ÇIKIŞ"},
        {w1: "SMOKE", w2: "FOG", ans: "SMOG", hint: "DUMAN & SİS"},
        {w1: "BREAKFAST", w2: "LUNCH", ans: "BRUNCH", hint: "YEMEK ZAMANI"}
    ];

    let current = 0;

    function init() {
        // Noktaları oluştur
        const dots = document.getElementById('dots');
        dots.innerHTML = '';
        for(let i=0; i<10; i++) {
            let d = document.createElement('div');
            d.className = i === current ? 'dot active' : 'dot';
            dots.appendChild(d);
        }
        
        // Seviyeyi yükle
        const data = levels[current % levels.length];
        document.getElementById('hint').textContent = data.hint;
        document.getElementById('w1').textContent = data.w1;
        document.getElementById('w2').textContent = data.w2;
        
        const slotContainer = document.getElementById('slots');
        slotContainer.innerHTML = '';
        for(let i=0; i<data.ans.length; i++) {
            let inp = document.createElement('input');
            inp.className = 'letter-slot';
            inp.maxLength = 1;
            inp.oninput = (e) => {
                if(e.target.value && slotContainer.children[i+1]) slotContainer.children[i+1].focus();
            };
            inp.onkeydown = (e) => {
                if(e.key === 'Backspace' && !e.target.value && slotContainer.children[i-1]) slotContainer.children[i-1].focus();
            };
            slotContainer.appendChild(inp);
        }
        slotContainer.children[0].focus();
    }

    function checkAnswer() {
        const inps = document.querySelectorAll('.letter-slot');
        const val = Array.from(inps).map(i => i.value).join('').toUpperCase();
        const correct = levels[current % levels.length].ans;

        if(val === correct) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#bde4ca'] });
            current++;
            setTimeout(init, 1500);
        } else {
            inps.forEach(i => {
                i.style.borderColor = '#ff4b2b';
                setTimeout(() => i.style.borderColor = '', 500);
            });
        }
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blending Pro - Master Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Lora:wght@700&display=swap');

        :root {
            --bg-dark: #0d1f18; /* Daha derin koyu yeşil */
            --text-light: #bde4ca;
            --accent-yellow: #ffcc00;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(189, 228, 202, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Başlangıç ve Bitiş Ekranı Animasyonu */
        .screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg-dark); z-index: 100;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.hide { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .main-wrapper {
            width: 100%; max-width: 900px; text-align: center;
            transition: opacity 0.5s;
        }

        /* Üst Panel */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px 30px; margin: 0 auto 30px auto;
            width: 85%; font-size: 14px; font-weight: 600;
        }

        .dots-group { display: flex; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(189, 228, 202, 0.1); }
        .dot.active { background: var(--accent-yellow); box-shadow: 0 0 8px var(--accent-yellow); }

        /* Soru Alanı */
        .category-tag { font-size: 13px; font-weight: 600; margin-bottom: 20px; opacity: 0.6; letter-spacing: 2px; }

        .word-container {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-bottom: 20px;
        }

        .word-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 25px 40px;
            font-family: 'Lora', serif; font-size: 38px; font-weight: 700;
        }

        /* Tüp Efekti (Blending Zone) */
        .tube-container {
            width: 120px; height: 40px;
            background: linear-gradient(90deg, transparent, var(--accent-yellow), transparent);
            opacity: 0.2; margin: 10px auto; border-radius: 50%;
            filter: blur(15px); animation: pulse 2s infinite;
        }

        /* Cevap Alanı */
        .answer-group { display: flex; justify-content: center; gap: 10px; margin: 35px 0; }
        .letter-slot {
            width: 55px; height: 75px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            font-size: 28px; font-weight: 800;
            color: var(--text-light); text-align: center;
            text-transform: uppercase; outline: none; transition: 0.2s;
        }
        .letter-slot:focus { border-color: var(--accent-yellow); background: rgba(255,255,255,0.05); }

        /* Butonlar */
        .btn-group { display: flex; justify-content: center; gap: 20px; }
        .btn {
            background: transparent; border: 1px solid var(--glass-border);
            color: var(--text-light); padding: 14px 45px; border-radius: 50px;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { border-color: var(--text-light); }
        .btn:hover { background: rgba(189, 228, 202, 0.1); transform: translateY(-2px); }

        @keyframes pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.3; } }
        
        h1 { font-family: 'Lora', serif; font-size: 4rem; margin-bottom: 20px; letter-spacing: -2px; }
    </style>
</head>
<body>

    <!-- Başlangıç Ekranı -->
    <div id="start-screen" class="screen">
        <div style="opacity: 0.6; font-weight: 800; letter-spacing: 5px; margin-bottom: 10px;">LEVEL 01</div>
        <h1>BLENDİNG</h1>
        <button class="btn btn-primary" onclick="startGame()">OYUNA BAŞLA</button>
    </div>

    <div class="main-wrapper" id="game-ui" style="opacity: 0;">
        <div class="top-bar">
            <span id="q-count">SORU 1 / 10</span>
            <div class="dots-group" id="dots"></div>
            <span>🍃 Süresiz</span>
        </div>

        <div class="category-tag" id="hint-text">YÜKLENİYOR...</div>
        
        <div class="word-container">
            <div class="word-box" id="w1">WORD</div>
            <div style="font-size: 24px; opacity: 0.4;">+</div>
            <div class="word-box" id="w2">WORD</div>
        </div>

        <div class="tube-container"></div>

        <div class="answer-group" id="slots"></div>

        <div class="btn-group">
            <button class="btn" onclick="passQuestion()">PAS GEÇ</button>
            <button class="btn btn-primary" onclick="checkAnswer()">KONTROL ET ✓</button>
        </div>
    </div>

    <!-- Bitiş Ekranı -->
    <div id="end-screen" class="screen hide">
        <h1>TEBRİKLER</h1>
        <p id="final-score" style="font-weight: 600; margin-bottom: 30px;"></p>
        <button class="btn btn-primary" onclick="location.reload()">TEKRAR OYNA</button>
    </div>

<script>
    const levels = [
        {w1: "BRITAIN", w2: "EXIT", ans: "BREXIT", hint: "GB BRITANYA & ÇIKIŞ"},
        {w1: "SMOKE", w2: "FOG", ans: "SMOG", hint: "DUMAN & SİS"},
        {w1: "MOTOR", w2: "HOTEL", ans: "MOTEL", hint: "MOTOR & OTEL"},
        {w1: "BREAKFAST", w2: "LUNCH", ans: "BRUNCH", hint: "KAHVALTI & ÖĞLE"},
        {w1: "CAMERA", w2: "RECORDER", ans: "CAMCORDER", hint: "KAMERA & KAYDEDİCİ"},
        {w1: "FRIEND", w2: "ENEMY", ans: "FRENEMY", hint: "DOST & DÜŞMAN"},
        {w1: "STAY", w2: "VACATION", ans: "STAYCATION", hint: "EVDE & TATİL"},
        {w1: "CHILL", w2: "RELAX", ans: "CHILLAX", hint: "SAKİNLİK & RAHATLAMA"},
        {w1: "GLAMOUR", w2: "CAMPING", ans: "GLAMPING", hint: "LÜKS & KAMP"},
        {w1: "WEB", w2: "SEMINAR", ans: "WEBINAR", hint: "İNTERNET & SEMİNER"}
    ];

    let current = 0;
    let score = 0;

    function startGame() {
        document.getElementById('start-screen').classList.add('hide');
        document.getElementById('game-ui').style.opacity = "1";
        initLevel();
    }

    function initLevel() {
        if(current >= 10) return finishGame();

        // Üst Bar & Dots
        document.getElementById('q-count').textContent = `SORU ${current + 1} / 10`;
        const dots = document.getElementById('dots');
        dots.innerHTML = '';
        for(let i=0; i<10; i++) {
            let d = document.createElement('div');
            d.className = i === current ? 'dot active' : 'dot';
            dots.appendChild(d);
        }

        const data = levels[current];
        document.getElementById('hint-text').textContent = data.hint;
        document.getElementById('w1').textContent = data.w1;
        document.getElementById('w2').textContent = data.w2;

        const slotContainer = document.getElementById('slots');
        slotContainer.innerHTML = '';
        for(let i=0; i<data.ans.length; i++) {
            let inp = document.createElement('input');
            inp.className = 'letter-slot';
            inp.maxLength = 1;
            inp.oninput = (e) => {
                if(e.target.value && slotContainer.children[i+1]) slotContainer.children[i+1].focus();
            };
            inp.onkeydown = (e) => {
                if(e.key === 'Backspace' && !e.target.value && slotContainer.children[i-1]) slotContainer.children[i-1].focus();
            };
            slotContainer.appendChild(inp);
        }
        slotContainer.children[0].focus();
    }

    function checkAnswer() {
        const inps = document.querySelectorAll('.letter-slot');
        const val = Array.from(inps).map(i => i.value).join('').toUpperCase();
        const correct = levels[current].ans;

        if(val === correct) {
            score++;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#bde4ca'] });
            current++;
            setTimeout(initLevel, 1000);
        } else {
            inps.forEach(i => {
                i.style.borderColor = '#ff4b2b';
                setTimeout(() => i.style.borderColor = '', 500);
            });
        }
    }

    function passQuestion() {
        current++;
        initLevel();
    }

    function finishGame() {
        document.getElementById('game-ui').style.opacity = "0";
        setTimeout(() => {
            document.getElementById('end-screen').classList.remove('hide');
            document.getElementById('final-score').textContent = `TOPLAM SKORUN: ${score} / 10`;
        }, 500);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GreenBlend: Elite Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --bg: #0d1a12;
    --green-accent: #4caf70;
    --light-green: #66bb6a;
    --gold-accent: #d4af37;
    --error-red: #e74c3c;
    --text: #faf8f0;
    --glass: rgba(255, 255, 255, 0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh; overflow: hidden;
    display: flex; justify-content: center; align-items: center;
    opacity: 0;
    animation: bodyFadeIn 1.5s ease-out forwards;
  }
  @keyframes bodyFadeIn { from { opacity: 0; } to { opacity: 1; } }

  canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; text-align: center;
    background: radial-gradient(circle at center, #1a3a2a, #0d1a12);
    padding: 20px;
    opacity: 0;
    transform: scale(1.1) translateY(20px);
    filter: blur(10px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .screen.active {
    display: flex;
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);
  }

  .card {
    padding: 3.5rem 2.5rem; border-radius: 45px;
    background: var(--glass); backdrop-filter: blur(30px);
    border: 1px solid rgba(212,175,55,0.15);
    max-width: 600px; width: 100%;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  h1 { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--green-accent); margin-bottom: 1rem; }
  h2 { font-family: 'Playfair Display', serif; font-weight: 900; letter-spacing: -1px; }

  .mode-item {
    width: 100%; max-width: 320px; margin-bottom: 25px;
    display: flex; flex-direction: column; align-items: center;
  }
  .mode-desc {
    font-family: 'Montserrat', sans-serif; font-size: 0.65rem; opacity: 0.6;
    letter-spacing: 1.5px; margin-top: 10px; text-transform: uppercase; font-weight: 500;
  }
  .free-btn { border-color: var(--light-green) !important; color: var(--light-green) !important; }

  .game-ui {
    width: 100%; max-width: 850px; z-index: 20; display: none;
    opacity: 0; transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
    padding: 20px;
  }
  .game-ui.active { display: block; opacity: 1; transform: translateY(0); }

  .header-stats {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 3.5rem; font-weight: 700; letter-spacing: 2px; font-size: 0.8rem; color: var(--gold-accent);
  }

  .tube-outer {
    flex-grow: 1; height: 8px; background: rgba(255,255,255,0.05);
    margin: 0 35px; border-radius: 12px; overflow: hidden; position: relative;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .tube-inner {
    width: 0%; height: 100%; background: var(--green-accent);
    box-shadow: 0 0 25px var(--green-accent); transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tube-penalty-flash {
    position: absolute; inset: 0; background: var(--error-red);
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }

  .word-row { display: flex; justify-content: center; align-items: center; gap: 1.5rem; margin-bottom: 3rem; }
  .word-item { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 900; color: #fff; }

  .input-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 3rem; flex-wrap: wrap; }
  .slot {
    width: 48px; height: 68px; background: rgba(255,255,255,0.04);
    border: none; border-bottom: 3px solid rgba(255,255,255,0.1);
    border-radius: 10px; font-size: 1.8rem; font-weight: 700;
    text-align: center; color: #fff; transition: 0.3s;
  }
  .slot:focus { outline: none; border-bottom-color: var(--green-accent); background: rgba(255,255,255,0.08); transform: scale(1.08); }
  
  .slot.error { border-bottom-color: var(--error-red) !important; animation: shake 0.4s; }
  .slot.reveal { color: var(--gold-accent) !important; border-bottom-color: var(--gold-accent) !important; transition: all 0.5s; font-weight: 900; }
  
  @keyframes shake { 0%, 100% {transform: translateX(0)} 25% {transform: translateX(-5px)} 75% {transform: translateX(5px)} }

  .finish-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 2.5rem 0;
  }
  .stat-box {
    background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 25px;
    border: 1px solid rgba(212,175,55,0.1); animation: statSlideUp 1s ease forwards; opacity: 0;
  }
  @keyframes statSlideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .btn {
    font-family: 'Space Grotesk', sans-serif;
    background: none; border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 1.2rem 2.5rem; border-radius: 60px;
    cursor: pointer; font-weight: 700; transition: 0.4s; letter-spacing: 3px;
    text-transform: uppercase; font-size: 0.75rem; width: 100%;
  }
  .btn:active { transform: scale(0.95); background: #fff; color: #000; }
  .hint-btn { border-color: var(--gold-accent); color: var(--gold-accent); }

  @media (max-width: 480px) {
    h1 { font-size: 2.8rem; }
    .word-item { font-size: 1.8rem; }
    .slot { width: 38px; height: 58px; font-size: 1.4rem; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="start-screen" class="screen active">
    <div class="card">
        <h1>GreenBlend</h1>
        <p style="letter-spacing: 12px; font-size: 0.6rem; margin-bottom: 4rem; opacity: 0.5;">ULTIMATE MASTER</p>
        <button class="btn" onclick="transitionTo('mode-screen')" style="max-width: 280px;">KEŞFETMEYE BAŞLA</button>
    </div>
</div>

<div id="mode-screen" class="screen">
    <div class="card">
        <h2 style="margin-bottom: 3.5rem; font-size: 2.8rem; color: var(--gold-accent);">Mod Seçimi</h2>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="mode-item">
                <button class="btn free-btn" onclick="initGame('free')">SÜRESİZ KEŞİF</button>
                <span class="mode-desc free-desc">Limitsiz zaman, sonsuz kelime</span>
            </div>
            <div class="mode-item">
                <button class="btn hint-btn" onclick="initGame('timed')">ZAMANA KARŞI</button>
                <span class="mode-desc">Hızlı düşün, barı koru</span>
            </div>
        </div>
    </div>
</div>

<div id="game-ui" class="game-ui">
    <div class="header-stats">
        <span id="score-text">HEDEF: %100</span>
        <div class="tube-outer">
            <div id="tube" class="tube-inner"></div>
            <div id="tube-flash" class="tube-penalty-flash"></div>
        </div>
        <span id="timer-display">00:00</span>
    </div>

    <div style="text-align: center;">
        <p style="font-style: italic; opacity: 0.6; margin-bottom: 1.5rem; font-size: 0.9rem;" id="hint-text">...</p>
        <div class="word-row">
            <div class="word-item" id="w1">...</div>
            <div style="color: var(--gold-accent); font-size: 1.5rem; opacity: 0.3;">+</div>
            <div class="word-item" id="w2">...</div>
        </div>
        <div class="input-row" id="slots-container"></div>
        <div style="display:flex; flex-direction: column; align-items:center; gap:12px;">
            <button id="hint-btn-el" class="btn hint-btn" onclick="giveHint()" style="max-width: 280px;">İPUCU (2)</button>
            <button id="pass-btn" class="btn" style="border:none; opacity:0.5; font-size: 0.7rem; max-width: 280px;" onclick="passAction()">BU KELİMEYİ PAS GEÇ</button>
        </div>
    </div>
</div>

<div id="end-screen" class="screen">
    <div class="card">
        <h2 style="font-size: 3rem; color: var(--gold-accent);">Mastermind!</h2>
        <div class="finish-stats">
            <div class="stat-box" style="animation-delay: 0.2s;">
                <p style="font-size: 0.6rem; opacity: 0.5;">TOPLAM SÜRE</p>
                <p id="final-time" style="font-size: 1.5rem; font-weight: 700; color: var(--light-green);">--:--</p>
            </div>
            <div class="stat-box" style="animation-delay: 0.4s;">
                <p style="font-size: 0.6rem; opacity: 0.5;">DOĞRULUK</p>
                <p style="font-size: 1.5rem; font-weight: 700; color: var(--gold-accent);">%100</p>
            </div>
        </div>
        <button class="btn" onclick="location.reload()" style="max-width: 280px; border-color: var(--light-green);">TEKRAR OYNA</button>
    </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, dur) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
}
const SFX = {
    click: () => playSound(600, 'sine', 0.1),
    correct: () => { playSound(500, 'sine', 0.2); setTimeout(()=>playSound(800, 'sine', 0.3), 100); },
    error: () => playSound(150, 'square', 0.3),
    hint: () => playSound(1000, 'triangle', 0.4)
};

let questionPool = [], currentItem, totalSec = 0, hintsLeft = 2, gameMode = 'free', timerInt, levelInt, timeLeft = 15, currentProgress = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let points = [], particleSpeedMult = 1;

function initBg() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    points = Array.from({length: 50}, () => ({
        x: Math.random()*canvas.width, y: Math.random()*canvas.height,
        r: Math.random()*3.5, spd: Math.random()*0.4+0.1,
        o: Math.random(), oSpd: Math.random()*0.02,
        c: Math.random() > 0.5 ? '#4caf70' : '#d4af37'
    }));
}

function animate() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    points.forEach(p => {
        p.o += p.oSpd;
        let alpha = (Math.sin(p.o) + 1) / 2;
        ctx.fillStyle = p.c; ctx.globalAlpha = alpha * 0.3;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        p.y -= p.spd * particleSpeedMult; if(p.y < 0) p.y = canvas.height;
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
}
initBg(); animate();

function transitionTo(screenId) {
    SFX.click();
    const screens = document.querySelectorAll('.screen');
    const target = document.getElementById(screenId);
    screens.forEach(s => {
        if(s.classList.contains('active')) {
            s.style.opacity = '0';
            s.style.filter = 'blur(10px)';
            s.style.transform = 'scale(0.9) translateY(-20px)';
            setTimeout(() => { s.classList.remove('active'); s.style.display = 'none'; }, 800);
        }
    });
    setTimeout(() => {
        target.style.display = 'flex';
        target.offsetHeight;
        target.classList.add('active');
        target.style.opacity = '1';
        target.style.filter = 'blur(0)';
        target.style.transform = 'scale(1) translateY(0)';
    }, 400);
}

function initGame(mode) {
    gameMode = mode; SFX.click();
    questionPool = shuffle([...ALL_DATA]);
    
    const modeScreen = document.getElementById('mode-screen');
    modeScreen.style.opacity = '0';
    modeScreen.style.filter = 'blur(10px)';
    
    setTimeout(() => {
        modeScreen.classList.remove('active');
        modeScreen.style.display = 'none';
        const gui = document.getElementById('game-ui');
        gui.style.display = 'block';
        setTimeout(() => { gui.classList.add('active'); gui.style.opacity = '1'; }, 50);
        
        // Genel oyun süresi sayacı
        timerInt = setInterval(() => {
            totalSec++;
            let m = Math.floor(totalSec/60).toString().padStart(2,'0');
            let s = (totalSec%60).toString().padStart(2,'0');
            if(gameMode === 'free') document.getElementById('timer-display').textContent = `${m}:${s}`;
        }, 1000);
        
        loadNewQuestion();
    }, 600);
}

function loadNewQuestion() {
    if(currentProgress >= 100) return finish();
    if(questionPool.length === 0) questionPool = shuffle([...ALL_DATA]);
    
    currentItem = questionPool.pop();
    hintsLeft = 2; updateHintButton();
    
    document.getElementById('w1').textContent = currentItem.a.toUpperCase();
    document.getElementById('w2').textContent = currentItem.b.toUpperCase();
    document.getElementById('hint-text').textContent = currentItem.h;
    
    const sc = document.getElementById('slots-container');
    sc.innerHTML = '';
    currentItem.r.split('').forEach((_, i) => {
        const inp = document.createElement('input');
        inp.className = 'slot';
        inp.maxLength = 1; inp.type = "text";
        inp.setAttribute('autocomplete', 'off');
        inp.oninput = (e) => {
            SFX.click();
            if(e.target.value && sc.children[i+1]) sc.children[i+1].focus();
            if(Array.from(sc.children).every(el => el.value.length === 1)) validate();
        };
        inp.onkeydown = (e) => {
            if(e.key === 'Backspace' && !e.target.value && sc.children[i-1]) sc.children[i-1].focus();
        };
        sc.appendChild(inp);
    });
    
    if(gameMode === 'timed') startTimedCountdown();
    setTimeout(() => { if(sc.children[0]) sc.children[0].focus(); }, 200);
}

// SÜRELİ MOD SAYACI DÜZELTMESİ
function startTimedCountdown() {
    timeLeft = 15;
    clearInterval(levelInt);
    document.getElementById('timer-display').textContent = `00:${timeLeft}`;
    
    levelInt = setInterval(() => {
        timeLeft--;
        const displaySec = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
        document.getElementById('timer-display').textContent = `00:${displaySec}`;
        
        if(timeLeft <= 0) { 
            clearInterval(levelInt); 
            SFX.error(); 
            passAction(true); 
        }
    }, 1000);
}

function validate() {
    const inps = document.querySelectorAll('.slot');
    const val = Array.from(inps).map(i => i.value).join('');
    if(val.toLowerCase() === currentItem.r.toLowerCase()) {
        SFX.correct();
        currentProgress = Math.min(100, currentProgress + 10);
        document.getElementById('tube').style.width = currentProgress + "%";
        confetti({ particleCount: 35, spread: 60, origin: {y:0.8}, colors: ['#4caf70', '#d4af37'] });
        clearInterval(levelInt);
        setTimeout(loadNewQuestion, 450); 
    } else {
        SFX.error();
        inps.forEach(i => { i.classList.add('error'); setTimeout(() => i.classList.remove('error'), 450); });
    }
}

function passAction(isAuto = false) {
    if(!isAuto) SFX.click();
    clearInterval(levelInt);
    currentProgress = Math.max(0, currentProgress - 10);
    document.getElementById('tube').style.width = currentProgress + "%";
    document.getElementById('tube-flash').style.opacity = '0.6';
    setTimeout(() => document.getElementById('tube-flash').style.opacity = '0', 400);

    const inps = document.querySelectorAll('.slot');
    const answer = currentItem.r.toUpperCase().split('');
    inps.forEach((inp, i) => {
        setTimeout(() => {
            inp.value = answer[i];
            inp.classList.add('reveal');
        }, i * 80);
    });
    setTimeout(loadNewQuestion, answer.length * 80 + 1000);
}

function giveHint() {
    if(hintsLeft <= 0) return;
    SFX.hint();
    const inps = Array.from(document.querySelectorAll('.slot'));
    const answer = currentItem.r.toUpperCase().split('');
    const targetIndex = inps.findIndex((inp, i) => inp.value.toUpperCase() !== answer[i]);
    if(targetIndex !== -1) {
        hintsLeft--; updateHintButton();
        inps[targetIndex].value = answer[targetIndex];
        inps[targetIndex].classList.add('reveal');
        if(inps.every(el => el.value.length === 1)) validate();
        else if(inps[targetIndex+1]) inps[targetIndex+1].focus();
    }
}

function updateHintButton() {
    const btn = document.getElementById('hint-btn-el');
    btn.textContent = `İPUCU (${hintsLeft})`;
    btn.disabled = hintsLeft <= 0;
}

function finish() {
    clearInterval(timerInt); clearInterval(levelInt);
    particleSpeedMult = 8;
    let m = Math.floor(totalSec/60).toString().padStart(2,'0');
    let s = (totalSec%60).toString().padStart(2,'0');
    document.getElementById('final-time').textContent = `${m}:${s}`;
    document.getElementById('game-ui').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('game-ui').style.display = 'none';
        transitionTo('end-screen');
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }, 600);
}

window.onresize = initBg;
</script>
</body>
</html>

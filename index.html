<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blending - Nature Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --nature-green: #2e7d32;
            --soft-green: #81c784;
            --error-red: #d32f2f;
            --overlay: rgba(0, 0, 0, 0.5);
            --card-bg: rgba(20, 30, 20, 0.85);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            transition: 1.5s ease-in-out;
            background: #1b5e20; 
        }

        /* Arka plan katmanı */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(var(--overlay), var(--overlay)), url('gece.png') no-repeat center center fixed;
            background-size: cover; z-index: -1; transition: 1.2s;
        }

        body.day-mode .bg-layer {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('gunduz.png') no-repeat center center fixed;
            background-size: cover;
        }

        .nature-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--nature-green);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            width: 95%; max-width: 580px;
            position: relative;
        }

        h1 {
            font-weight: 900; /* Kalın font */
            font-size: 2.5rem;
            color: var(--soft-green);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p { font-weight: 600; opacity: 0.9; }

        .letter-input {
            width: 48px; height: 58px;
            margin: 4px; font-size: 2rem;
            font-weight: 800; /* Harfler daha kalın */
            text-align: center; text-transform: uppercase;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--soft-green);
            border-radius: 12px; color: white; outline: none;
            transition: 0.2s;
        }

        .letter-input:focus { 
            background: rgba(255,255,255,0.2);
            border-color: #ffffff;
        }

        .letter-input.correct { 
            background: var(--nature-green); 
            border-color: #fff; 
            box-shadow: 0 0 10px var(--soft-green);
        }

        .letter-input.error { 
            background: var(--error-red); 
            animation: shake 0.4s; 
        }

        .btn {
            background: var(--nature-green);
            border: none; color: white;
            padding: 15px 30px; margin: 10px;
            border-radius: 10px; cursor: pointer;
            font-weight: 800; font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn:hover { background: var(--soft-green); transform: translateY(-2px); }

        .btn-pass {
            background: transparent;
            border: 2px solid var(--error-red);
            color: var(--error-red);
        }

        .btn-pass:hover { background: var(--error-red); color: white; }

        #tube-container {
            position: fixed; left: 30px; height: 280px; width: 25px;
            background: rgba(0,0,0,0.3); border: 2px solid var(--soft-green);
            border-radius: 15px; display: none; align-items: flex-end; padding: 2px;
        }
        #tube-fill {
            width: 100%; background: linear-gradient(to top, var(--nature-green), var(--soft-green));
            border-radius: 12px; transition: height 0.5s ease;
        }

        .revealed-text {
            height: 30px; margin-top: 15px; font-weight: 800; color: #ffeb3b;
        }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div id="tube-container"><div id="tube-fill" style="height: 0%;"></div></div>

    <div class="nature-card" id="menu-screen">
        <h1>BLENDİNG</h1>
        <p>Doğanın Gücüyle Kelimeleri Birleştir</p>
        <button class="btn" onclick="startGame('free')">OYUNA BAŞLA</button>
        <button class="btn" onclick="startGame('timed')" style="background: #f57c00;">SÜRELİ MOD (15s)</button>
    </div>

    <div class="nature-card" id="game-screen" style="display: none;">
        <div style="display: flex; justify-content: space-between; font-weight: 800; margin-bottom: 20px;">
            <span id="stopwatch">00:00</span>
            <span id="q-counter">1 / 10</span>
            <span id="timed-info" style="color: #ffeb3b; display: none;">Kalan: <span id="countdown">15</span></span>
        </div>
        <div id="current-q" style="font-size: 1.8rem; font-weight: 900; margin-bottom: 25px; color: #fff;">---</div>
        <div id="letter-box"></div>
        <div id="reveal-zone" class="revealed-text"></div>
        <button class="btn btn-pass" onclick="passQuestion()">PAS GEÇ / CEVABI GÖR</button>
    </div>

    <div class="nature-card" id="final-screen" style="display: none;">
        <h1>TEBRİKLER!</h1>
        <p id="final-stats" style="font-size: 1.2rem;"></p>
        <button class="btn" onclick="location.reload()">TEKRAR OYNA</button>
    </div>

<script>
    const sounds = {
        correct: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
        error: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
        pass: new Audio('https://assets.mixkit.co/active_storage/sfx/953/953-preview.mp3')
    };

    const words = [
        {q: "Bloom + Biology", a: "Bloomology"}, {q: "Sprout + Maintain", a: "Sproutain"}, {q: "Floral + Universe", a: "Floraverse"},
        {q: "Verdant + Nature", a: "Verdanture"}, {q: "Stem + Empathy", a: "Stempathy"}, {q: "Seed + Landscape", a: "Seedscape"},
        {q: "Branch + Chic", a: "Branchic"}, {q: "Moss + Osmosis", a: "Mossmosis"}, {q: "Twig + Digital", a: "Twigital"},
        {q: "Leaf + Purity", a: "Leafity"}, {q: "Vine + Innovate", a: "Vinevate"}, {q: "Fern + Finish", a: "Fernish"},
        {q: "Root + Utopia", a: "Rootopia"}, {q: "Bud + Flow", a: "Budflow"}, {q: "Bark + Architecture", a: "Barkitecture"},
        {q: "Petal + Logic", a: "Petalogic"}, {q: "Leaf + Evolution", a: "Leafolution"}, {q: "Forest + Static", a: "Forestatic"},
        {q: "Bloom + Mania", a: "Bloomania"}, {q: "Wild + Design", a: "Wildesign"}, {q: "Eco + System", a: "Ecosystem"},
        {q: "Garden + Energy", a: "Gardenergy"}, {q: "Green + Galaxy", a: "Greenglaxy"}, {q: "Earth + Rhythm", a: "Earththm"}
    ];

    let currentIndex = 0, gameData = [], mode = 'free', timer, countdown, timeLeft = 15, score = 0;

    function startGame(m) {
        mode = m;
        gameData = [...words].sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('tube-container').style.display = 'flex';
        document.body.classList.add('day-mode');
        
        if(mode === 'timed') document.getElementById('timed-info').style.display = 'block';
        
        startStopwatch();
        loadLevel();
    }

    function loadLevel() {
        const cur = gameData[currentIndex];
        document.getElementById('current-q').textContent = cur.q;
        document.getElementById('q-counter').textContent = `${currentIndex + 1} / 10`;
        document.getElementById('reveal-zone').textContent = '';
        
        const box = document.getElementById('letter-box');
        box.innerHTML = '';
        
        for(let i=0; i<cur.a.length; i++) {
            let inp = document.createElement('input');
            inp.className = 'letter-input';
            inp.maxLength = 1;
            inp.addEventListener('input', (e) => {
                if(e.target.value && box.children[i+1]) box.children[i+1].focus();
                checkAnswer();
            });
            inp.addEventListener('keydown', (e) => {
                if(e.key === 'Backspace' && !e.target.value && box.children[i-1]) box.children[i-1].focus();
            });
            box.appendChild(inp);
        }
        box.children[0].focus();
        if(mode === 'timed') startCountdown();
    }

    function checkAnswer() {
        const inps = document.querySelectorAll('.letter-input');
        let val = Array.from(inps).map(i => i.value).join('');
        let target = gameData[currentIndex].a;

        if(val.length === target.length) {
            if(val.toLowerCase() === target.toLowerCase()) {
                sounds.correct.play();
                inps.forEach(i => i.className = 'letter-input correct');
                score++;
                updateTube();
                clearInterval(countdown);
                setTimeout(next, 700);
            } else {
                sounds.error.play();
                inps.forEach(i => {
                    i.classList.add('error');
                    setTimeout(() => i.classList.remove('error'), 400);
                });
            }
        }
    }

    function passQuestion() {
        sounds.pass.play();
        document.getElementById('reveal-zone').textContent = "CEVAP: " + gameData[currentIndex].a;
        const inps = document.querySelectorAll('.letter-input');
        inps.forEach((inp, idx) => {
            inp.value = gameData[currentIndex].a[idx];
            inp.disabled = true;
        });
        clearInterval(countdown);
        setTimeout(next, 1500);
    }

    function startCountdown() {
        timeLeft = 15;
        document.getElementById('countdown').textContent = timeLeft;
        clearInterval(countdown);
        countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').textContent = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                passQuestion();
            }
        }, 1000);
    }

    function updateTube() {
        document.getElementById('tube-fill').style.height = (score * 10) + '%';
    }

    function next() {
        currentIndex++;
        if(currentIndex < 10) loadLevel();
        else finish();
    }

    function startStopwatch() {
        let sec = 0;
        timer = setInterval(() => {
            sec++;
            let m = Math.floor(sec/60).toString().padStart(2,'0');
            let s = (sec%60).toString().padStart(2,'0');
            document.getElementById('stopwatch').textContent = `${m}:${s}`;
        }, 1000);
    }

    function finish() {
        clearInterval(timer);
        document.body.classList.remove('day-mode');
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        document.getElementById('final-stats').innerHTML = `Süre: ${document.getElementById('stopwatch').textContent}<br>Toplam Skor: ${score} / 10`;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>

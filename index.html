<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blending - Nature Pure</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --main-green: #27ae60;
            --dark-forest: #145a32;
            --overlay: rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
            /* Arka planı kaliteli bir doğa görseliyle değiştirdim */
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2071&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            width: 90%; max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900; /* Ekstra kalın font */
            margin-bottom: 20px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .question {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 30px;
            display: block;
        }

        .input-wrapper {
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }

        .letter-input {
            width: 45px; height: 60px;
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid #fff;
            border-radius: 10px;
            font-size: 2rem; font-weight: 900;
            color: #fff; text-align: center;
            text-transform: uppercase; outline: none;
            transition: 0.3s;
        }

        .letter-input:focus {
            border-color: var(--main-green);
            background: rgba(0, 0, 0, 0.5);
            transform: translateY(-5px);
        }

        .letter-input.correct {
            background: var(--main-green);
            border-color: #fff;
        }

        .btn-action {
            margin-top: 30px;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
            background: var(--main-green);
            border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
        }

        .btn-action:hover {
            background: var(--dark-forest);
            transform: scale(1.05);
        }

        #timer { font-weight: 900; color: var(--main-green); font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="glass-box" id="main-container">
        <div id="start-ui">
            <h1>BLENDİNG</h1>
            <p style="font-weight: 600; margin-bottom: 20px;">Doğa ve Kelimelerin Uyumu</p>
            <button class="btn-action" onclick="start()">BAŞLA</button>
        </div>

        <div id="game-ui" style="display: none;">
            <div id="timer">00:00</div>
            <div class="question" id="q-text">---</div>
            <div class="input-wrapper" id="inputs"></div>
            <button class="btn-action" style="background: rgba(255,255,255,0.2);" onclick="next()">PAS GEÇ</button>
        </div>
    </div>

<script>
    const words = [
        {q: "Bloom + Biology", a: "Bloomology"}, {q: "Leaf + Purity", a: "Leafity"},
        {q: "Root + Utopia", a: "Rootopia"}, {q: "Forest + Static", a: "Forestatic"},
        {q: "Eco + System", a: "Ecosystem"}, {q: "Garden + Energy", a: "Gardenergy"}
    ];

    let current = 0, score = 0, startTime;

    function start() {
        document.getElementById('start-ui').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        startTime = Date.now();
        setInterval(updateClock, 1000);
        load();
    }

    function load() {
        const item = words[current];
        document.getElementById('q-text').textContent = item.q;
        const box = document.getElementById('inputs');
        box.innerHTML = '';
        
        for(let i=0; i<item.a.length; i++) {
            let inp = document.createElement('input');
            inp.className = 'letter-input';
            inp.maxLength = 1;
            inp.oninput = (e) => {
                if(e.target.value && box.children[i+1]) box.children[i+1].focus();
                check();
            };
            box.appendChild(inp);
        }
        box.children[0].focus();
    }

    function check() {
        const inps = document.querySelectorAll('.letter-input');
        const guess = Array.from(inps).map(i => i.value).join('').toLowerCase();
        const ans = words[current].a.toLowerCase();

        if(guess === ans) {
            inps.forEach(i => i.classList.add('correct'));
            score++;
            setTimeout(next, 600);
        }
    }

    function next() {
        current++;
        if(current < words.length) load();
        else {
            document.getElementById('main-container').innerHTML = `<h1>BİTTİ!</h1><p style='font-weight:800'>SKOR: ${score}/${words.length}</p>`;
            confetti();
        }
    }

    function updateClock() {
        let sec = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer').textContent = new Date(sec * 1000).toISOString().substr(14, 5);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kralingo - Kelime Türetme Oyunu</title>
    <style>
        /* --- GENEL TASARIM --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                              url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 1.5rem; }
        
        .formula {
            font-size: 1.8rem;
            font-weight: bold;
            color: #27ae60;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus { border-color: #27ae60; }

        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: #219150; }

        #feedback {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
        }

        .progress {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        /* --- SONUÇ EKRANI --- */
        #final-screen { display: none; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="container" id="game-screen">
        <h1 id="title">Kelime Birleştirme</h1>
        <div class="progress" id="counter">Soru: 1 / 10</div>
        <div class="formula" id="current-formula">Atmosphere + feel</div>
        
        <input type="text" id="user-input" placeholder="Cevabınızı yazın..." autocomplete="off">
        <br>
        <button onclick="checkAnswer()">Onayla</button>
        
        <div id="feedback"></div>
    </div>

    <div class="container" id="final-screen">
        <h1>TEBRİKLER!</h1>
        <p>Tüm kelimeleri başarıyla tamamladınız.</p>
        <button onclick="location.reload()">Tekrar Oyna</button>
    </div>

    <script>
        // Veri Seti
        const originalData = [
            { question: "Atmosphere + feel", answer: "Atmosfeel" },
            { question: "Pollen + energize", answer: "Pollenize" },
            { question: "Petal + balance", answer: "Petalance" },
            { question: "Green + innovate", answer: "Greenovate" },
            { question: "Earth + ethic", answer: "Earthic" },
            { question: "Root + routine", answer: "Rootine" },
            { question: "Nature + real", answer: "Natureal" },
            { question: "Leaf + lifestyle", answer: "Leafstyle" },
            { question: "Nature + relief", answer: "Naturelief" },
            { question: "Solar + artistic", answer: "Solaristhic" }
        ];

        let gameData = [];
        let currentIndex = 0;

        // Karıştırma Fonksiyonu (Fisher-Yates Shuffle)
        function shuffleData(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            gameData = shuffleData([...originalData]); // Veriyi kopyala ve karıştır
            currentIndex = 0;
            updateUI();
        }

        function updateUI() {
            if (currentIndex < gameData.length) {
                document.getElementById('current-formula').textContent = gameData[currentIndex].question;
                document.getElementById('counter').textContent = `Soru: ${currentIndex + 1} / ${gameData.length}`;
                document.getElementById('user-input').value = '';
                document.getElementById('feedback').textContent = '';
                document.getElementById('user-input').focus();
            } else {
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('final-screen').style.display = 'block';
            }
        }

        function checkAnswer() {
            const userInput = document.getElementById('user-input').value.trim();
            const correctAnswer = gameData[currentIndex].answer;
            const feedback = document.getElementById('feedback');

            if (userInput.toLowerCase() === correctAnswer.toLowerCase()) {
                feedback.textContent = "Doğru!";
                feedback.style.color = "#27ae60";
                setTimeout(() => {
                    currentIndex++;
                    updateUI();
                }, 800);
            } else {
                feedback.textContent = "Hatalı yazım, tekrar deneyiniz.";
                feedback.style.color = "#e74c3c";
            }
        }

        // Enter tuşu ile onaylama desteği
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // Oyunu başlat
        initGame();
    </script>
</body>
</html>
